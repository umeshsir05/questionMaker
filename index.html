<!DOCTYPE html>
<html>
<head>
    <title>Daily Word</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>Daily Word Meaning</h1>
    <button id="allowBtn">🔔 Allow Notification</button>
    <button id="testBtn">🔔 Test Notification</button>
    
    <script>
        let swRegistration = null;

        // Notification permission lena
        document.getElementById('allowBtn').addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            
            if(permission === 'granted') {
                // Service worker register karo
                swRegistration = await navigator.serviceWorker.register('sw.js');
                alert('Notification allowed! Daily word milega subah 9 AM.');
                
                // Schedule daily notification
                scheduleDailyWord();
            }
        });

        // Test button for immediate notification
        document.getElementById('testBtn').addEventListener('click', async () => {
            const word = await getRandomWord();
            await showNotification(word);
        });

        // Random word lena API se
        async function getRandomWord() {
            try {
                // Random word API
                const wordRes = await fetch('https://random-word-api.herokuapp.com/word');
                const wordData = await wordRes.json();
                const randomWord = wordData[0];
                
                // Meaning API
                const meaningRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${randomWord}`);
                const meaningData = await meaningRes.json();
                
                return {
                    word: randomWord,
                    meaning: meaningData[0]?.meanings[0]?.definitions[0]?.definition || 'Meaning not found'
                };
            } catch(error) {
                return {
                    word: 'Hello',
                    meaning: 'A greeting'
                };
            }
        }

        // Notification dikhana
        async function showNotification(wordData) {
            if(swRegistration) {
                await swRegistration.showNotification(wordData.word, {
                    body: wordData.meaning,
                    icon: 'icon.png',
                    badge: 'icon.png',
                    vibrate: [200, 100, 200]
                });
            }
        }

        // Daily word schedule karna (bina database ke)
        function scheduleDailyWord() {
            // Last notification time check karo LocalStorage mein
            const lastNotif = localStorage.getItem('lastWordNotification');
            const today = new Date().toDateString();
            
            // Agar aaj notification nahi bheja to bhejo
            if(lastNotif !== today) {
                // Time calculate karo 9 AM ke liye
                const now = new Date();
                const scheduledTime = new Date();
                scheduledTime.setHours(9, 0, 0, 0); // 9 AM
                
                if(now > scheduledTime) {
                    // Agar time nikal gaya to kal ke liye set karo
                    scheduledTime.setDate(scheduledTime.getDate() + 1);
                }
                
                const timeUntilNine = scheduledTime - now;
                
                setTimeout(async () => {
                    const word = await getRandomWord();
                    await showNotification(word);
                    localStorage.setItem('lastWordNotification', today);
                    
                    // Next day ke liye dobara schedule karo
                    scheduleDailyWord();
                }, timeUntilNine);
            }
        }

        // Check karo agar already permission hai to
        if(Notification.permission === 'granted') {
            navigator.serviceWorker.register('sw.js').then(reg => {
                swRegistration = reg;
                scheduleDailyWord();
            });
        }
    </script>
</body>
</html>
