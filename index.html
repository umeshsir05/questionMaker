<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Paper Maker | Exam Creator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-pen-alt"></i>
            <span>QPaper Maker</span>
        </div>
        
        <!-- Toggle Menu Button for Mobile -->
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>

        <!-- Nav Links -->
        <ul class="nav-links" id="navLinks">
            <li><a href="#home" class="active"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#create"><i class="fas fa-plus-circle"></i> Create</a></li>
            <li><a href="#templates"><i class="fas fa-file-alt"></i> Templates</a></li>
            <li><a href="#saved"><i class="fas fa-save"></i> Saved</a></li>
            <li>
                <!-- Dark Mode Toggle -->
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <h1><i class="fas fa-file-signature"></i> Question Paper Generator</h1>
            <p>Create professional question papers for classes 5th to 12th</p>
        </div>

        <!-- Question Paper Form -->
        <div class="paper-form">
            <div class="form-header">
                <h2>Paper Details</h2>
                <div class="form-actions">
                    <button class="btn-preview" id="previewBtn">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                    <button class="btn-save" id="saveBtn">
                        <i class="fas fa-download"></i> Save PDF
                    </button>
                </div>
            </div>

            <form id="paperForm">
                <!-- Basic Details -->
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-school"></i> School/Institute Name</label>
                        <input type="text" id="schoolName" placeholder="e.g., Delhi Public School" value="Delhi Public School">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-book"></i> Subject</label>
                        <input type="text" id="subject" placeholder="e.g., Mathematics" value="Mathematics">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-layer-group"></i> Class</label>
                        <select id="class">
                            <option value="5">Class 5</option>
                            <option value="6">Class 6</option>
                            <option value="7">Class 7</option>
                            <option value="8">Class 8</option>
                            <option value="9">Class 9</option>
                            <option value="10" selected>Class 10</option>
                            <option value="11">Class 11</option>
                            <option value="12">Class 12</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> Time Allowed</label>
                        <input type="text" id="time" placeholder="e.g., 3 Hours" value="3 Hours">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-star"></i> Maximum Marks</label>
                        <input type="number" id="maxMarks" value="80">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Date</label>
                        <input type="date" id="date" value="2025-03-15">
                    </div>
                </div>

                <!-- Instructions -->
                <div class="form-group">
                    <label><i class="fas fa-info-circle"></i> General Instructions</label>
                    <textarea id="instructions" rows="3">1. All questions are compulsory.
2. Read each question carefully before answering.
3. Write your answers in the space provided.</textarea>
                </div>

                <!-- Questions Section -->
                <div class="questions-section">
                    <div class="section-header">
                        <h3><i class="fas fa-question-circle"></i> Questions</h3>
                        <button type="button" class="btn-add" id="addQuestionBtn">
                            <i class="fas fa-plus"></i> Add Question
                        </button>
                    </div>

                    <div id="questionsContainer">
                        <!-- Questions will be added here dynamically -->
                    </div>
                </div>
            </form>
        </div>

        <!-- Preview Section -->
        <div class="preview-section" id="previewSection">
            <div class="preview-header">
                <h2><i class="fas fa-file-pdf"></i> Preview</h2>
                <button class="btn-close-preview" id="closePreview">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="paper-preview" id="paperPreview">
                <!-- Preview content will be displayed here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2025 QPaper Maker. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
